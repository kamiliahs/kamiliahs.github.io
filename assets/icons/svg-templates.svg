<!-- Screenshot 1 (540x720) - Mockup de vista POS -->
<svg width="540" height="720" viewBox="0 0 540 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="540" height="720" fill="#ffffff"/>
  
  <!-- Header -->
  <rect width="540" height="80" fill="#000000"/>
  <text x="30" y="35" font-family="Arial" font-size="12" fill="#888888">STORE NO. 01</text>
  <text x="30" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff">TERMINAL</text>
  <text x="470" y="35" font-family="Arial" font-size="12" fill="#888888" text-anchor="end">PROFIT HOY</text>
  <text x="470" y="60" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="end">SRD 0.00</text>
  
  <!-- Products List -->
  <line x1="30" y1="100" x2="510" y2="100" stroke="#eeeeee" stroke-width="1"/>
  <text x="30" y="140" font-family="Arial" font-size="10" fill="#888888">🍕 RECETA</text>
  <text x="30" y="160" font-family="Arial" font-size="18" font-weight="bold">MARGHERITA CLASSIC</text>
  <text x="490" y="160" font-family="Arial" font-size="22" font-weight="bold" text-anchor="end">120</text>
  
  <line x1="30" y1="180" x2="510" y2="180" stroke="#eeeeee" stroke-width="1"/>
  
  <!-- Bottom Navigation -->
  <rect y="650" width="540" height="70" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <text x="60" y="690" font-family="Arial" font-size="11" font-weight="bold" fill="#000000" text-anchor="middle">VENTAS</text>
  <text x="180" y="690" font-family="Arial" font-size="11" font-weight="bold" fill="#888888" text-anchor="middle">STOCK</text>
  <text x="300" y="690" font-family="Arial" font-size="11" font-weight="bold" fill="#888888" text-anchor="middle">STATS</text>
  <text x="420" y="690" font-family="Arial" font-size="11" font-weight="bold" fill="#888888" text-anchor="middle">MENU</text>
</svg>

